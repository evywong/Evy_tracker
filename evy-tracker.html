<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Evy Log">
<title>Evy · 每日记录</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --cr:#F5F1EB;--cr2:#EDE8DF;--cr3:#E5DFD4;--cd:#FDFAF5;
  --go:#8B6F3E;--go2:#C4A96E;--gof:rgba(139,111,62,.1);
  --gn:#5D8A5A;--gnf:rgba(93,138,90,.12);
  --ro:#B06060;--bl:#5A85A8;--blf:rgba(90,133,168,.1);
  --bd:#DDD8CE;--bd2:#D0C9BE;
  --t1:#2B2720;--t2:#6B6358;--t3:#A89E92;--t4:#C8C0B4;
  --r:14px;--sh:0 2px 12px rgba(43,39,32,.06);
}
html,body{background:var(--cr);font-family:'DM Sans',sans-serif;color:var(--t1);min-height:100vh;-webkit-font-smoothing:antialiased;}

/* TOP BAR */
.topbar{display:flex;justify-content:space-between;align-items:center;padding:52px 20px 0;position:sticky;top:0;background:var(--cr);z-index:10;}
.logo{font-family:'DM Serif Display',serif;font-style:italic;font-size:22px;color:var(--go);}
.tabs{display:flex;gap:2px;background:var(--cr2);border-radius:20px;padding:3px;}
.tab{font-size:12px;padding:5px 12px;border-radius:16px;border:none;background:transparent;color:var(--t3);cursor:pointer;font-family:inherit;transition:all .2s;}
.tab.on{background:var(--cd);color:var(--t1);font-weight:500;box-shadow:0 1px 4px rgba(43,39,32,.08);}

/* VIEWS */
.view{display:none;padding:0 16px 110px;}
.view.on{display:block;}

/* DATE */
.datehd{display:flex;align-items:center;gap:14px;padding:20px 0 16px;}
.dcircle{width:58px;height:58px;border-radius:50%;background:var(--go);display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;}
.dcircle .dday{font-family:'DM Serif Display',serif;font-size:22px;color:#fff;line-height:1;}
.dcircle .dmon{font-size:9px;color:rgba(255,255,255,.6);letter-spacing:.1em;text-transform:uppercase;margin-top:2px;}
.dfull{font-size:15px;font-weight:500;}
.dwk{font-size:12px;color:var(--t3);margin-top:2px;}

/* CARD */
.card{background:var(--cd);border:.5px solid var(--bd);border-radius:var(--r);padding:16px 18px;box-shadow:var(--sh);margin-bottom:12px;}
.chd{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.cico{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.ico-e{background:var(--gof);}
.ico-b{background:var(--gnf);}
.ico-s{background:var(--blf);}
.cttl{font-size:13px;font-weight:600;}
.csub{font-size:11px;color:var(--t3);margin-top:1px;}

/* TOGGLE */
.togrow{display:flex;align-items:center;justify-content:space-between;}
.toglbl{font-size:14px;color:var(--t2);}
.tog{width:46px;height:26px;background:var(--cr3);border-radius:13px;border:none;cursor:pointer;position:relative;transition:background .25s;flex-shrink:0;}
.tog::after{content:'';position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:10px;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.15);transition:transform .25s;}
.tog.on{background:var(--gn);}
.tog.on::after{transform:translateX(20px);}

/* COLLAPSIBLE */
.sub{overflow:hidden;max-height:0;transition:max-height .35s ease,opacity .3s;opacity:0;}
.sub.on{max-height:900px;opacity:1;}
.subi{padding-top:14px;border-top:.5px solid var(--bd);margin-top:14px;}

/* FIELD LABEL */
.fl{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--t4);margin-bottom:8px;}

/* CHIPS */
.chips{overflow-x:auto;display:flex;gap:7px;padding-bottom:2px;margin-bottom:14px;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.chips::-webkit-scrollbar{display:none;}
.chip{white-space:nowrap;padding:6px 14px;border-radius:20px;border:.5px solid var(--bd2);background:transparent;font-size:13px;color:var(--t2);cursor:pointer;font-family:inherit;flex-shrink:0;transition:all .15s;}
.chip.on{background:var(--go);border-color:var(--go);color:#fff;font-weight:500;}

/* DROPDOWN */
.dd{position:relative;margin-bottom:14px;}
.ddval{display:flex;align-items:center;justify-content:space-between;background:var(--cr2);border-radius:10px;padding:10px 14px;font-size:14px;cursor:pointer;user-select:none;}
.ddval .ph{color:var(--t4);}
.ddarr{font-size:10px;color:var(--t3);transition:transform .2s;margin-left:8px;flex-shrink:0;}
.dd.op .ddarr{transform:rotate(180deg);}
.ddpanel{display:none;position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--cd);border:.5px solid var(--bd);border-radius:12px;box-shadow:0 8px 24px rgba(43,39,32,.12);z-index:100;overflow:hidden;}
.dd.op .ddpanel{display:block;}
.ddsearch{width:100%;border:none;border-bottom:.5px solid var(--bd);padding:10px 14px;font-size:14px;background:transparent;outline:none;font-family:inherit;color:var(--t1);}
.ddsearch::placeholder{color:var(--t4);}
.ddlist{max-height:180px;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.ddi{padding:11px 14px;font-size:14px;cursor:pointer;color:var(--t1);}
.ddi:active{background:var(--cr2);}
.ddi.sel{color:var(--go);font-weight:500;}
.ddnone{padding:11px 14px;font-size:13px;color:var(--t4);}

/* DURATION SLIDER */

/* NUMBER STEPPER */
.numrow{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.numbtn{width:36px;height:36px;border-radius:50%;border:.5px solid var(--bd2);background:transparent;font-size:20px;color:var(--t2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit;line-height:1;}
.numbtn:active{background:var(--cr2);}
.numval{font-family:'DM Serif Display',serif;font-size:30px;color:var(--go);min-width:36px;text-align:center;line-height:1;}
.numlbl{font-size:12px;color:var(--t3);}

/* TEXT / TIME INPUTS */
.txti{width:100%;font-family:inherit;font-size:14px;color:var(--t1);background:var(--cr2);border:none;border-radius:10px;padding:10px 14px;outline:none;margin-bottom:14px;}
.txti::placeholder{color:var(--t4);}
textarea.txti{resize:none;line-height:1.5;}
input[type=time].txti{font-size:20px;font-weight:500;margin-bottom:0;}

/* SAVE BTN */
.savebtn{width:100%;padding:16px;background:var(--go);color:#fff;font-family:inherit;font-size:15px;font-weight:600;border:none;border-radius:var(--r);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:4px;transition:opacity .2s,transform .1s;}
.savebtn:active{transform:scale(.98);opacity:.9;}

/* TEMPLATES */
.tplhd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.tplhdtxt{font-size:13px;font-weight:600;}
.tpladd{font-size:12px;color:var(--go);background:none;border:none;cursor:pointer;font-family:inherit;padding:0;}
.tpli{display:flex;align-items:center;gap:10px;background:var(--cr2);border-radius:10px;padding:10px 12px;cursor:pointer;margin-bottom:8px;}
.tpli:active{background:var(--cr3);}
.tpliico{font-size:18px;flex-shrink:0;}
.tpliinfo{flex:1;}
.tpliname{font-size:13px;font-weight:500;}
.tplimeta{font-size:11px;color:var(--t3);margin-top:2px;}
.tplidel{font-size:18px;color:var(--t4);background:none;border:none;cursor:pointer;padding:4px;line-height:1;}
.tplempty{font-size:13px;color:var(--t4);text-align:center;padding:14px 0;}

/* TOAST */
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--t1);color:#fff;padding:11px 22px;border-radius:24px;font-size:13px;opacity:0;transition:all .28s;pointer-events:none;white-space:nowrap;z-index:999;}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0);}

/* HISTORY */
.sumstrip{display:flex;gap:8px;padding-top:20px;margin-bottom:12px;}
.sumpill{flex:1;background:var(--cd);border:.5px solid var(--bd);border-radius:12px;padding:10px 6px;text-align:center;}
.sumn{font-family:'DM Serif Display',serif;font-size:20px;color:var(--go);line-height:1;}
.suml{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.07em;margin-top:3px;}
.dgrp{margin-bottom:16px;}
.dgrplbl{font-size:10px;color:var(--t4);letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px;padding:0 2px;}
.hcard{background:var(--cd);border:.5px solid var(--bd);border-radius:12px;overflow:hidden;}
.hrow{display:flex;align-items:flex-start;gap:10px;padding:11px 14px;border-bottom:.5px solid var(--cr2);}
.hrow:last-child{border-bottom:none;}
.hico{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;margin-top:1px;}
.hinfo{flex:1;}
.hname{font-size:13px;font-weight:500;}
.hmeta{font-size:11px;color:var(--t3);margin-top:2px;line-height:1.4;}
.hbadge{font-size:10px;padding:3px 8px;border-radius:10px;font-weight:500;flex-shrink:0;margin-top:2px;}
.byes{background:var(--gnf);color:var(--gn);}
.bno{background:var(--cr2);color:var(--t4);}
.empty{text-align:center;padding:50px 20px;color:var(--t3);}
.loading{text-align:center;padding:40px 20px;color:var(--t3);font-size:13px;}
.expbtn{width:100%;padding:13px;background:transparent;color:var(--go);font-family:inherit;font-size:14px;font-weight:500;border:1px solid var(--go);border-radius:var(--r);cursor:pointer;margin-top:12px;}

/* STATS */
.mpicker{display:flex;gap:8px;overflow-x:auto;padding:4px 0 10px;-webkit-overflow-scrolling:touch;scrollbar-width:none;margin-bottom:4px;}
.mpicker::-webkit-scrollbar{display:none;}
.mpbtn{white-space:nowrap;padding:6px 14px;border-radius:20px;border:.5px solid var(--bd2);background:transparent;font-size:12px;color:var(--t2);cursor:pointer;font-family:inherit;flex-shrink:0;transition:all .15s;}
.mpbtn.on{background:var(--go);border-color:var(--go);color:#fff;font-weight:500;}
.biggrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.bigstat{background:var(--cd);border:.5px solid var(--bd);border-radius:12px;padding:14px 16px;}
.bigstatn{font-family:'DM Serif Display',serif;font-size:28px;color:var(--go);line-height:1;}
.bigstatl{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.07em;margin-top:4px;}
.stcard{background:var(--cd);border:.5px solid var(--bd);border-radius:var(--r);padding:16px 18px;margin-bottom:12px;}
.stttl{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--t4);margin-bottom:14px;}
.sbar{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.sbarlbl{font-size:12px;color:var(--t2);width:76px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sbartrk{flex:1;background:var(--cr2);border-radius:3px;height:18px;overflow:hidden;}
.sbarfill{height:100%;border-radius:3px;display:flex;align-items:center;padding-left:7px;}
.sbarval{font-size:10px;font-weight:500;white-space:nowrap;}
.calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.caldow{font-size:9px;color:var(--t4);text-align:center;padding-bottom:3px;}
.calday{aspect-ratio:1;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--t3);background:var(--cr2);}
.calday.ex{background:var(--go);color:#fff;font-weight:500;}
.calday.bn{background:var(--gn);color:#fff;}
.calday.both{background:var(--go);color:#fff;font-weight:500;position:relative;}
.calday.both::after{content:'';position:absolute;bottom:2px;right:2px;width:5px;height:5px;border-radius:50%;background:#7EC87B;}
.calday.tod{box-shadow:0 0 0 1.5px var(--go2);}
.calday.emp{background:transparent;}
.slrow{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.sllbl{font-size:11px;color:var(--t3);width:70px;flex-shrink:0;text-align:right;}
.sltrk{flex:1;background:var(--cr2);border-radius:2px;height:14px;overflow:hidden;}
.slfill{height:100%;border-radius:2px;}
.sln{font-size:10px;color:var(--t3);width:24px;text-align:right;}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(43,39,32,.5);z-index:300;align-items:flex-end;}
.overlay.on{display:flex;}
.modal{background:var(--cd);border-radius:20px 20px 0 0;width:100%;padding:24px 20px 48px;}
.modalhd{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.modalttl{font-size:16px;font-weight:600;}
.modalclose{font-size:22px;color:var(--t3);background:none;border:none;cursor:pointer;line-height:1;padding:0 4px;}

/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:0;right:0;background:rgba(245,241,235,.95);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-top:.5px solid var(--bd);display:flex;padding:10px 0 28px;z-index:50;}
.bn{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;border:none;background:transparent;cursor:pointer;padding:4px;}
.bnico{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;transition:background .2s;}
.bn.on .bnico{background:var(--gof);}
.bnlbl{font-size:10px;color:var(--t4);letter-spacing:.03em;}
.bn.on .bnlbl{color:var(--go);font-weight:500;}

/* PASSWORD LOCK */
.lockscreen{position:fixed;inset:0;background:#F5F1EB;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 32px;}
.lock-logo{font-family:'DM Serif Display',serif;font-style:italic;font-size:36px;color:#8B6F3E;margin-bottom:8px;}
.lock-sub{font-size:13px;color:#A89E92;margin-bottom:48px;letter-spacing:0.05em;}
.lock-input{width:100%;max-width:280px;font-family:inherit;font-size:20px;font-weight:500;letter-spacing:0.2em;text-align:center;color:#2B2720;background:#EDE8DF;border:none;border-radius:12px;padding:14px 20px;outline:none;margin-bottom:12px;}
.lock-input::placeholder{font-size:14px;letter-spacing:0.05em;color:#C8C0B4;font-weight:400;}
.lock-input.err{background:#F5E4E4;animation:shake .3s ease;}
.lock-btn{width:100%;max-width:280px;padding:15px;background:#8B6F3E;color:#fff;font-family:inherit;font-size:15px;font-weight:600;border:none;border-radius:12px;cursor:pointer;transition:opacity .2s;}
.lock-btn:active{opacity:.85;}
.lock-hint{font-size:11px;color:#C8C0B4;margin-top:16px;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
</style>
</head>
<body>


<div class="lockscreen" id="lockscreen">
  <div class="lock-logo">Evy</div>
  <div class="lock-sub">每日记录</div>
  <input class="lock-input" id="lockInput" type="password" placeholder="输入密码" maxlength="20"
    onkeydown="if(event.key==='Enter')checkPwd()">
  <button class="lock-btn" onclick="checkPwd()">进入</button>
  <div class="lock-hint">· 仅限本人使用 ·</div>
</div>

<div class="topbar">
  <div class="logo">Evy</div>
  <div class="tabs">
    <button class="tab on" id="tab-log" onclick="showView('log')">记录</button>
    <button class="tab" id="tab-history" onclick="showView('history')">历史</button>
    <button class="tab" id="tab-stats" onclick="showView('stats')">本月</button>
  </div>
</div>

<!-- LOG -->
<div id="v-log" class="view on">
  <div class="datehd">
    <div class="dcircle"><div class="dday" id="dday">1</div><div class="dmon" id="dmon">JAN</div></div>
    <div><div class="dfull" id="dfull"></div><div class="dwk" id="dwk"></div></div>
  </div>

  <div class="card">
    <div class="tplhd"><span class="tplhdtxt">⚡ 快速模板</span><button class="tpladd" onclick="openTplModal()">＋ 保存当前</button></div>
    <div id="tpllist"><div class="tplempty">保存常用组合，下次一键填入</div></div>
  </div>

  <div class="card">
    <div class="chd"><div class="cico ico-e">🧘</div><div><div class="cttl">运动</div><div class="csub">今天有运动吗？</div></div></div>
    <div class="togrow"><span class="toglbl">今天有运动</span><button class="tog" id="togE" onclick="togSec('E')"></button></div>
    <div class="sub" id="subE">
      <div class="subi">
        <div class="fl">运动类型</div>
        <div class="chips" id="cType">
          <button class="chip on" onclick="pickChip(this,'cType')">瑜伽</button>
          <button class="chip" onclick="pickChip(this,'cType')">普拉提</button>
          <button class="chip" onclick="pickChip(this,'cType')">力量训练</button>
          <button class="chip" onclick="pickChip(this,'cType')">有氧</button>
          <button class="chip" onclick="pickChip(this,'cType')">拉伸</button>
          <button class="chip" onclick="pickChip(this,'cType')">舞蹈</button>
          <button class="chip" onclick="pickChip(this,'cType')">婵柔</button>
          <button class="chip" onclick="pickChip(this,'cType')">其他</button>
        </div>
        <div class="fl">上课形式</div>
        <div class="chips" id="cForm">
          <button class="chip on" onclick="pickChip(this,'cForm')">团课</button>
          <button class="chip" onclick="pickChip(this,'cForm')">私教</button>
          <button class="chip" onclick="pickChip(this,'cForm')">线上跟练</button>
          <button class="chip" onclick="pickChip(this,'cForm')">自己练习</button>
          <button class="chip" onclick="pickChip(this,'cForm')">工作坊</button>
          <button class="chip" onclick="pickChip(this,'cForm')">培训</button>
          <button class="chip" onclick="pickChip(this,'cForm')">带课</button>
          <button class="chip" onclick="pickChip(this,'cForm')">其他</button>
        </div>
        <div class="fl">机构</div>
        <div class="dd" id="ddI">
          <div class="ddval" onclick="toggleDD('ddI')"><span id="ddI-v" class="ph">选择或输入</span><span class="ddarr">▾</span></div>
          <div class="ddpanel"><input class="ddsearch" placeholder="搜索…" oninput="filterDD('ddI',this.value)"><div class="ddlist" id="ddI-l"></div></div>
        </div>
        <div class="fl">教练</div>
        <div class="dd" id="ddC">
          <div class="ddval" onclick="toggleDD('ddC')"><span id="ddC-v" class="ph">选择或输入</span><span class="ddarr">▾</span></div>
          <div class="ddpanel"><input class="ddsearch" placeholder="搜索…" oninput="filterDD('ddC',this.value)"><div class="ddlist" id="ddC-l"></div></div>
        </div>
        <div class="fl">课程主题</div>
        <div class="dd" id="ddK">
          <div class="ddval" onclick="toggleDD('ddK')"><span id="ddK-v" class="ph">选择或输入</span><span class="ddarr">▾</span></div>
          <div class="ddpanel"><input class="ddsearch" placeholder="搜索…" oninput="filterDD('ddK',this.value)"><div class="ddlist" id="ddK-l"></div></div>
        </div>
        <div class="fl">订单类型</div>
        <div class="dd" id="ddO">
          <div class="ddval" onclick="toggleDD('ddO')"><span id="ddO-v" class="ph">选择或输入</span><span class="ddarr">▾</span></div>
          <div class="ddpanel"><input class="ddsearch" placeholder="搜索…" oninput="filterDD('ddO',this.value)"><div class="ddlist" id="ddO-l"></div></div>
        </div>
        <div class="fl">运动时长</div>
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;">
          <input class="txti" type="number" id="durR" value="60" min="1" max="999" style="width:90px;font-size:22px;font-weight:500;color:var(--go);text-align:center;margin-bottom:0;">
          <span style="font-size:13px;color:var(--t3)">分钟</span>
        </div>
        <div class="fl">跑步公里（选填）</div>
        <input class="txti" type="number" id="inKm" placeholder="0.0" step="0.1" min="0">
        <div class="fl">备注（选填）</div>
        <textarea class="txti" id="inNote" rows="2" placeholder="感受、内容…"></textarea>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="chd"><div class="cico ico-b">🍱</div><div><div class="cttl">便当</div><div class="csub">今天做了多少个？</div></div></div>
    <div class="togrow"><span class="toglbl">今天做了便当</span><button class="tog" id="togB" onclick="togSec('B')"></button></div>
    <div class="sub" id="subB">
      <div class="subi">
        <div class="fl">便当个数</div>

window.addEventListener('DOMContentLoaded', function() {
  initDate();
  initDDs();
  renderTpls();

  // close dropdowns on outside tap
  document.addEventListener('click', function(e) {
    if (!e.target.closest('.dd')) closeAllDDs();
  });
  // close modal on overlay click
  document.getElementById('tplOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeTplModal();
  });
});

function initDate() {
  var n = new Date();
  document.getElementById('dday').textContent = n.getDate();
  document.getElementById('dmon').textContent = MO[n.getMonth()];
  document.getElementById('dfull').textContent = n.getFullYear()+'年'+(n.getMonth()+1)+'月'+n.getDate()+'日';
  document.getElementById('dwk').textContent = WD[n.getDay()];
}

function initDDs() {
  Object.keys(DDOPTS).forEach(function(id) {
    renderDDList(id, '');
  });
}

// ═══════════════════════════════════════════
// HISTORY DATA LOADING
// ═══════════════════════════════════════════
function loadHistData() {
  try {
    var bin = atob(B64);
    var u8 = new Uint8Array(bin.length);
    for (var i = 0; i < bin.length; i++) u8[i] = bin.charCodeAt(i);
    var ds = new DecompressionStream('gzip');
    var writer = ds.writable.getWriter();
    var reader = ds.readable.getReader();
    writer.write(u8);
    writer.close();
    var chunks = [];
    function pump() {
      reader.read().then(function(res) {
        if (res.done) {
          var total = 0;
          chunks.forEach(function(c) { total += c.length; });
          var all = new Uint8Array(total);
          var off = 0;
          chunks.forEach(function(c) { all.set(c, off); off += c.length; });
          var mini = JSON.parse(new TextDecoder().decode(all));
          histData = mini.map(function(m) {
            return {
              date: m.d,
              exercise: m.e ? {type:m.e.t||'',form:m.e.f||'',inst:m.e.i||'',coach:m.e.c||'',topic:m.e.k||'',order:m.e.o||'',dur:m.e.r||0,km:m.e.km||'',note:m.e.n||''} : null,
              bento: m.b ? {num:m.b, note:''} : null,
              sleep: m.s || null,
              src: 'imp'
            };
          });
          if (currentView === 'history') renderHistory();
          if (currentView === 'stats') renderStats();
        } else {
          chunks.push(res.value);
          pump();
        }
      });
    }
    pump();
  } catch(err) {
    console.error('loadHistData failed', err);
    histData = [];
    if (currentView === 'history') renderHistory();
    if (currentView === 'stats') renderStats();
  }
}

function getAllLogs() {
  var local = [];
  for (var i = 0; i < localStorage.length; i++) {
    var k = localStorage.key(i);
    if (k && k.startsWith('evylog_')) {
      try { local.push(JSON.parse(localStorage.getItem(k))); } catch(e) {}
    }
  }
  var localDates = {};
  local.forEach(function(l) { localDates[l.date] = true; });
  var hist = (histData || []).filter(function(l) { return !localDates[l.date]; });
  return local.concat(hist).sort(function(a,b) { return b.date < a.date ? -1 : 1; });
}

// ═══════════════════════════════════════════
// VIEW SWITCHING
// ═══════════════════════════════════════════
function showView(v) {
  currentView = v;
  document.querySelectorAll('.view').forEach(function(el) { el.classList.remove('on'); });
  document.querySelectorAll('.tab').forEach(function(el) { el.classList.remove('on'); });
  document.querySelectorAll('.bn').forEach(function(el) { el.classList.remove('on'); });
  document.getElementById('v-'+v).classList.add('on');
  var tab = document.getElementById('tab-'+v);
  if (tab) tab.classList.add('on');
  var bn = document.getElementById('bn-'+v);
  if (bn) bn.classList.add('on');
  if (v === 'history') renderHistory();
  if (v === 'stats') renderStats();
}

function togSec(k) {
  togState[k] = !togState[k];
  document.getElementById('tog'+k).classList.toggle('on', togState[k]);
  document.getElementById('sub'+k).classList.toggle('on', togState[k]);
}

// ═══════════════════════════════════════════
// CHIPS
// ═══════════════════════════════════════════
function pickChip(btn, groupId) {
  document.querySelectorAll('#'+groupId+' .chip').forEach(function(c) { c.classList.remove('on'); });
  btn.classList.add('on');
}
function getChip(groupId) {
  var el = document.querySelector('#'+groupId+' .chip.on');
  return el ? el.textContent : '';
}

// ═══════════════════════════════════════════
// DROPDOWNS
// ═══════════════════════════════════════════
function renderDDList(id, q) {
  var items = DDOPTS[id] || [];
  if (q) {
    var ql = q.toLowerCase();
    items = items.filter(function(v) { return v.toLowerCase().indexOf(ql) !== -1; });
  }
  var list = document.getElementById(id+'-l');
  if (!list) return;
  if (!items.length) {
    list.innerHTML = '<div class="ddnone">无匹配，输入值可直接使用</div>';
    return;
  }
  list.innerHTML = items.map(function(v) {
    var sel = ddVal[id] === v ? ' sel' : '';
    return '<div class="ddi'+sel+'" onclick="pickDD(\''+id+'\',\''+v.replace(/'/g,"\\'")+'\')">' + v + '</div>';
  }).join('');
}

function toggleDD(id) {
  var el = document.getElementById(id);
  var wasOpen = el.classList.contains('op');
  closeAllDDs();
  if (!wasOpen) el.classList.add('op');
}

function closeAllDDs() {
  document.querySelectorAll('.dd.op').forEach(function(el) { el.classList.remove('op'); });
}

function filterDD(id, q) {
  // if user typed something not in list, treat as custom value
  ddVal[id] = q || null;
  if (!q) {
    var vEl = document.getElementById(id+'-v');
    if (vEl) { vEl.textContent = '选择或输入'; vEl.classList.add('ph'); }
  }
  renderDDList(id, q);
}

function pickDD(id, v) {
  ddVal[id] = v;
  var vEl = document.getElementById(id+'-v');
  if (vEl) { vEl.textContent = v; vEl.classList.remove('ph'); }
  document.getElementById(id).classList.remove('op');
  renderDDList(id, '');
  // clear search input
  var si = document.querySelector('#'+id+' .ddsearch');
  if (si) si.value = '';
}

// ═══════════════════════════════════════════
// BENTO COUNTER
// ═══════════════════════════════════════════
function adjBn(d) {
  bnCount = Math.max(1, bnCount + d);
  document.getElementById('bnN').textContent = bnCount;
}

// ═══════════════════════════════════════════
function getFormData() {
  return {
    exercise: togState.E ? {
      type: getChip('cType'),
      form: getChip('cForm'),
      inst: ddVal.ddI || '',
      coach: ddVal.ddC || '',
      topic: ddVal.ddK || '',
      order: ddVal.ddO || '',
      dur: parseInt(document.getElementById('durR').value) || 60,
      km: document.getElementById('inKm').value || '',
      note: document.getElementById('inNote').value.trim()
    } : null,
    bento: togState.B ? { num: bnCount, note: document.getElementById('inBnNote').value.trim() } : null,
    sleep: null
  };
}

function setFormData(data) {
  // exercise
  if (data.exercise) {
    if (!togState.E) togSec('E');
    var e = data.exercise;
    if (e.type) {
      document.querySelectorAll('#cType .chip').forEach(function(c) {
        c.classList.toggle('on', c.textContent === e.type);
      });
    }
    if (e.form) {
      document.querySelectorAll('#cForm .chip').forEach(function(c) {
        c.classList.toggle('on', c.textContent === e.form);
      });
    }
    ['ddI','ddC','ddK','ddO'].forEach(function(id, i) {
      var v = [e.inst, e.coach, e.topic, e.order][i];
      if (v) pickDD(id, v);
    });
    if (e.dur) {
      document.getElementById('durR').value = e.dur;
      document.getElementById('durN').textContent = e.dur;
    }
  }
}

// ═══════════════════════════════════════════
// SAVE LOG
// ═══════════════════════════════════════════
function saveLog() {
  var now = new Date();
  var dateStr = now.toISOString().slice(0,10);
  var data = Object.assign({ date: dateStr }, getFormData());
  localStorage.setItem('evylog_' + dateStr, JSON.stringify(data));
  showToast('已保存 ✦');
}

// ═══════════════════════════════════════════
// TEMPLATES
// ═══════════════════════════════════════════
function getTpls() { try { return JSON.parse(localStorage.getItem('evytpls') || '[]'); } catch(e) { return []; } }
function saveTpls(arr) { localStorage.setItem('evytpls', JSON.stringify(arr)); }

function renderTpls() {
  var tpls = getTpls();
  var el = document.getElementById('tpllist');
  if (!tpls.length) { el.innerHTML = '<div class="tplempty">保存常用组合，下次一键填入</div>'; return; }
  el.innerHTML = tpls.map(function(t, i) {
    var e = t.data.exercise || {};
    var meta = [e.type, e.inst, e.dur ? e.dur+'min' : ''].filter(Boolean).join(' · ');
    return '<div class="tpli" onclick="loadTpl('+i+')">'
      + '<div class="tpliico">⚡</div>'
      + '<div class="tpliinfo"><div class="tpliname">'+t.name+'</div><div class="tplimeta">'+meta+'</div></div>'
      + '<button class="tplidel" onclick="event.stopPropagation();delTpl('+i+')">×</button>'
      + '</div>';
  }).join('');
}

function loadTpl(i) {
  var t = getTpls()[i];
  if (!t) return;
  setFormData(t.data);
  showToast('已加载「' + t.name + '」');
}

function delTpl(i) {
  var tpls = getTpls();
  tpls.splice(i, 1);
  saveTpls(tpls);
  renderTpls();
}

function openTplModal() {
  document.getElementById('tplOverlay').classList.add('on');
  setTimeout(function() { document.getElementById('tplNameInput').focus(); }, 100);
}

function closeTplModal() {
  document.getElementById('tplOverlay').classList.remove('on');
}

function saveTpl() {
  var name = document.getElementById('tplNameInput').value.trim();
  if (!name) { showToast('请输入模板名称'); return; }
  var tpls = getTpls();
  tpls.unshift({ name: name, data: getFormData() });
  saveTpls(tpls);
  renderTpls();
  closeTplModal();
  document.getElementById('tplNameInput').value = '';
  showToast('模板已保存');
}

// ═══════════════════════════════════════════
// HISTORY RENDER
// ═══════════════════════════════════════════
function renderHistory() {
  var logs = getAllLogs();
  // Set cutoff date: latest date in data, fallback to today
  var latestDate = logs.length ? logs[0].date : new Date().toISOString().slice(0,10);
  var ld = new Date(latestDate + 'T12:00:00');
  document.getElementById('histCutoff').textContent = ld.getFullYear()+'/'+(ld.getMonth()+1)+'/'+ld.getDate();
  var exD = 0, bn = 0, hrs = 0;
  logs.forEach(function(l) {
    if (l.exercise) { exD++; hrs += l.exercise.dur || 0; }
    if (l.bento) bn += l.bento.num || 0;
  });
  document.getElementById('hEx').textContent = exD;
  document.getElementById('hBn').textContent = BENTO_TOTAL;
  document.getElementById('hH').textContent = Math.round(hrs / 60);



  renderYearlyStats(logs);

  var list = document.getElementById('histList');
  if (!logs.length) {
    list.innerHTML = '<div class="empty"><div style="font-size:36px;margin-bottom:10px">🌱</div><p>暂无记录</p></div>';
    return;
  }

  list.innerHTML = logs.map(function(l) {
    var d = new Date(l.date + 'T12:00:00');
    var lbl = (d.getMonth()+1) + '月' + d.getDate() + '日 ' + WD[d.getDay()];
    var rows = '';
    if (l.exercise) {
      var e = l.exercise;
      var meta = [e.inst, e.coach, e.topic, e.dur ? e.dur+'min' : '', e.km ? e.km+'km' : ''].filter(Boolean).join(' · ');
      rows += '<div class="hrow"><div class="hico ico-e">🧘</div>'
        + '<div class="hinfo"><div class="hname">' + [e.type, e.form].filter(Boolean).join(' · ') + '</div>'
        + (meta ? '<div class="hmeta">' + meta + '</div>' : '')
        + (e.note ? '<div class="hmeta">' + e.note + '</div>' : '')
        + '</div><span class="hbadge byes">运动</span></div>';
    }
    if (l.bento) {
      rows += '<div class="hrow"><div class="hico ico-b">🍱</div>'
        + '<div class="hinfo"><div class="hname">便当 ' + (l.bento.num || 0) + ' 个</div>'
        + (l.bento.note ? '<div class="hmeta">' + l.bento.note + '</div>' : '')
        + '</div><span class="hbadge byes">便当</span></div>';
    }
    if (!rows) {
      rows = '<div class="hrow"><div class="hinfo"><div class="hname" style="color:var(--t4)">无详细记录</div></div></div>';
    }
    return '<div class="dgrp"><div class="dgrplbl">' + lbl + '</div><div class="hcard">' + rows + '</div></div>';
  }).join('');
}

// ═══════════════════════════════════════════
// YEARLY OVERVIEW (in history view)
// ═══════════════════════════════════════════
function renderYearlyStats(logs) {
  var byYear = {};
  logs.forEach(function(l) {
    var y = l.date.slice(0,4);
    if (!byYear[y]) byYear[y] = { exDays:0, exMin:0, bento:0, days:0 };
    byYear[y].days++;
    if (l.exercise) { byYear[y].exDays++; byYear[y].exMin += l.exercise.dur||0; }
    if (l.bento) byYear[y].bento += l.bento.num||0;
  });
  var years = Object.keys(byYear).sort().reverse();
  if (!years.length) { document.getElementById('yearlyStats').innerHTML=''; return; }
  var maxH = Math.max.apply(null, years.map(function(y){return byYear[y].exMin/60;}));
  var maxB = Math.max.apply(null, years.map(function(y){return byYear[y].bento;}));
  var exRows = years.map(function(y) {
    var h = Math.round(byYear[y].exMin/60*10)/10;
    return '<div class="sbar"><span class="sbarlbl">'+y+'</span>'
      + '<div class="sbartrk"><div class="sbarfill" style="width:'+(maxH?Math.round(h/maxH*100):0)+'%;background:rgba(139,111,62,.1);border-right:2px solid #8B6F3E">'
      + '<span class="sbarval" style="color:#8B6F3E">'+h+'h</span></div></div></div>';
  }).join('');
  var bnRows = years.map(function(y) {
    var b = byYear[y].bento;
    return '<div class="sbar"><span class="sbarlbl">'+y+'</span>'
      + '<div class="sbartrk"><div class="sbarfill" style="width:'+(maxB?Math.round(b/maxB*100):0)+'%;background:rgba(93,138,90,.12);border-right:2px solid #5D8A5A">'
      + '<span class="sbarval" style="color:#5D8A5A">'+b+'个</span></div></div></div>';
  }).join('');
  // Use authoritative bento data from 汇总呈现
  var bentoYears = Object.keys(BENTO_BY_YEAR).sort();
  var maxBento = Math.max.apply(null, bentoYears.map(function(y){return BENTO_BY_YEAR[y];}));
  var bentoRows = bentoYears.reverse().map(function(y){
    var v = BENTO_BY_YEAR[y];
    return '<div class="sbar"><span class="sbarlbl">'+y+'</span>'
      +'<div class="sbartrk"><div class="sbarfill" style="width:'+Math.round(v/maxBento*100)+'%;background:rgba(93,138,90,.12);border-right:2px solid #5D8A5A">'
      +'<span class="sbarval" style="color:#5D8A5A">'+v+'个</span></div></div></div>';
  }).join('');
  var milestoneHtml = '<div class="stcard"><div class="stttl">便当累计</div>'
    + '<div style="display:flex;align-items:baseline;gap:8px;margin-bottom:10px">'
    + '<span style="font-family:\'DM Serif Display\',serif;font-size:32px;color:#8B6F3E">'+BENTO_TOTAL+'</span>'
    + '</div>'
    + '</div>'
    + '<div class="stcard"><div class="stttl">年度便当数</div>' + bentoRows + '</div>';

  document.getElementById('yearlyStats').innerHTML =
    milestoneHtml
    + '<div class="stcard"><div class="stttl">年度运动时长</div>' + exRows + '</div>';
}

// ═══════════════════════════════════════════
// STATS RENDER
// ═══════════════════════════════════════════
function renderStats() {
  var all = getAllLogs();
  if (!statsYM) {
    var now = new Date();
    statsYM = { y: now.getFullYear(), m: now.getMonth() };
  }

  // build month picker
  var monthSet = {};
  all.forEach(function(l) { monthSet[l.date.slice(0,7)] = true; });
  var months = Object.keys(monthSet).sort().reverse().slice(0, 36);
  var picker = document.getElementById('mpicker');
  picker.innerHTML = months.map(function(ym) {
    var parts = ym.split('-');
    var y = parseInt(parts[0]), m = parseInt(parts[1]) - 1;
    var label = y + '.' + (m+1);
    var isCur = y === statsYM.y && m === statsYM.m;
    return '<button class="mpbtn' + (isCur ? ' on' : '') + '" onclick="setStatsMonth(' + y + ',' + m + ')">' + label + '</button>';
  }).join('');

  var y = statsYM.y, m = statsYM.m;
  var prefix = y + '-' + String(m+1).padStart(2,'0');
  var logs = all.filter(function(l) { return l.date.slice(0,7) === prefix; });

  var exDays = logs.filter(function(l) { return l.exercise; }).length;
  var bnTotal = logs.reduce(function(s,l) { return s + (l.bento ? (l.bento.num||0) : 0); }, 0);
  var totalMin = logs.reduce(function(s,l) { return s + (l.exercise ? (l.exercise.dur||0) : 0); }, 0);
  document.getElementById('mEx').textContent = exDays;
  document.getElementById('mBn').textContent = bnTotal;
  document.getElementById('mH').textContent = Math.round(totalMin/60*10)/10;


  var body = document.getElementById('statsBody');
  var html = '';

  // Calendar
  var daysInMonth = new Date(y, m+1, 0).getDate();
  var firstDow = new Date(y, m, 1).getDay();
  var today = new Date().toISOString().slice(0,10);
  var logMap = {};
  logs.forEach(function(l) { logMap[l.date] = { ex: !!l.exercise, bn: !!l.bento }; });
  var calHtml = ['日','一','二','三','四','五','六'].map(function(d) {
    return '<div class="caldow">' + d + '</div>';
  }).join('');
  for (var i = 0; i < firstDow; i++) calHtml += '<div class="calday emp"></div>';
  for (var d2 = 1; d2 <= daysInMonth; d2++) {
    var ds2 = prefix + '-' + String(d2).padStart(2,'0');
    var info = logMap[ds2] || {};
    var cls = 'calday';
    if (info.ex && info.bn) cls += ' both';
    else if (info.ex) cls += ' ex';
    else if (info.bn) cls += ' bn';
    if (ds2 === today) cls += ' tod';
    calHtml += '<div class="' + cls + '">' + d2 + '</div>';
  }
  html += '<div class="stcard"><div class="stttl">打卡日历 · ' + y + '年' + (m+1) + '月</div>'
    + '<div style="display:flex;gap:12px;font-size:10px;color:var(--t3);margin-bottom:8px">'
    + '<span><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:var(--go);margin-right:4px;vertical-align:middle"></span>运动</span>'
    + '<span><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:var(--gn);margin-right:4px;vertical-align:middle"></span>便当</span>'
    + '</div><div class="calgrid">' + calHtml + '</div></div>';

  // Exercise stats
  var exLogs = logs.filter(function(l) { return l.exercise; });
  if (exLogs.length) {
    html += '<div class="biggrid">'
      + '<div class="bigstat"><div class="bigstatn">' + exDays + '</div><div class="bigstatl">运动天数</div></div>'
      + '<div class="bigstat"><div class="bigstatn">' + Math.round(totalMin/60*10)/10 + '<span style="font-size:13px;font-weight:300;color:var(--t3)"> h</span></div><div class="bigstatl">总时长</div></div>'
      + '</div>';

    html += barChart('运动类型', exLogs, function(l) { return l.exercise.type || '其他'; }, '#8B6F3E', 'rgba(139,111,62,.1)');
    html += barChart('上课形式', exLogs, function(l) { return l.exercise.form || '其他'; }, '#5A85A8', 'rgba(90,133,168,.1)');
    var instMap = {};
    exLogs.forEach(function(l) { var v = l.exercise.inst; if (v) instMap[v] = (instMap[v]||0)+1; });
    if (Object.keys(instMap).length > 1) {
      html += barChart('上课机构', exLogs, function(l) { return l.exercise.inst || '其他'; }, '#5D8A5A', 'rgba(93,138,90,.12)');
    }
  }

  // Bento
  if (bnTotal > 0) {
    var bnDays = logs.filter(function(l) { return l.bento; }).length;
    html += '<div class="biggrid">'
      + '<div class="bigstat"><div class="bigstatn">' + bnTotal + '</div><div class="bigstatl">便当总数</div></div>'
      + '<div class="bigstat"><div class="bigstatn">' + bnDays + '</div><div class="bigstatl">做便当天数</div></div>'
      + '</div>';
  }

  body.innerHTML = html || '<div class="empty"><p>本月暂无数据</p></div>';
}

function barChart(title, logs, getter, color, bg) {
  var map = {};
  logs.forEach(function(l) { var v = getter(l)||'其他'; map[v] = (map[v]||0)+1; });
  var entries = Object.keys(map).map(function(k) { return [k, map[k]]; }).sort(function(a,b) { return b[1]-a[1]; });
  if (!entries.length) return '';
  var max = entries[0][1];
  var rows = entries.map(function(e) {
    return '<div class="sbar"><span class="sbarlbl">' + e[0] + '</span>'
      + '<div class="sbartrk"><div class="sbarfill" style="width:' + Math.round(e[1]/max*100) + '%;background:' + bg + ';border-right:2px solid ' + color + '">'
      + '<span class="sbarval" style="color:' + color + '">' + e[1] + '次</span></div></div></div>';
  }).join('');
  return '<div class="stcard"><div class="stttl">' + title + '</div>' + rows + '</div>';
}

function setStatsMonth(y, m) {
  statsYM = { y: y, m: m };
  renderStats();
}

// ═══════════════════════════════════════════
// EXPORT
// ═══════════════════════════════════════════
function exportCSV() {
  var logs = getAllLogs();
  if (!logs.length) { showToast('暂无数据'); return; }
  var rows = [['日期','是否运动','运动类型','上课形式','机构','教练','课程主题','订单类型','运动时长(min)','跑步公里','备注','便当个数','便当备注','睡觉时间']];
  logs.forEach(function(l) {
    var e = l.exercise || {};
    rows.push([l.date, l.exercise?'Y':'N', e.type||'', e.form||'', e.inst||'', e.coach||'', e.topic||'', e.order||'', e.dur||'', e.km||'', e.note||'', l.bento?(l.bento.num||''):'', l.bento?(l.bento.note||''):'', l.sleep||'']);
  });
  var csv = rows.map(function(r) { return r.map(function(v) { return '"'+String(v).replace(/"/g,'""')+'"'; }).join(','); }).join('\n');
  var blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'evy-log.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  showToast('CSV 已导出');
}

  var t = document.getElementById('toast');

}
